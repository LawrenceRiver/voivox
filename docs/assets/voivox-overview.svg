<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">VOIVOX product overview</title>
  <desc id="desc">Chrome extension, macOS desktop app, and Codex MCP connect to one local-first transcription core.</desc>
  <defs>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#f7f4eb"/><stop offset="1" stop-color="#e9eee8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#16303a" flood-opacity=".12"/></filter>
    <style>
      .headline{font:700 76px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:-3px;fill:#162126}.sub{font:400 26px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#52615d}.eyebrow{font:700 18px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:3px;fill:#0b6b6b}.card-title{font:700 28px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#162126}.card-copy{font:400 19px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#52615d}.core-title{font:700 34px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#fff}.core-copy{font:400 19px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#d9f0ec}.tag{font:700 17px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#0b6b6b}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#paper)"/>
  <circle cx="1470" cy="80" r="230" fill="#d8e8e0" opacity=".55"/>
  <circle cx="95" cy="825" r="195" fill="#f2d7aa" opacity=".44"/>
  <text x="110" y="130" class="eyebrow">LOCAL-FIRST AUDIO TO TEXT</text>
  <text x="110" y="215" class="headline">One quiet path from sound to text.</text>
  <text x="110" y="262" class="sub">VOIVOX listens only where you explicitly choose — then leaves the raw transcript in your hands.</text>
  <g filter="url(#shadow)">
    <rect x="110" y="350" width="360" height="250" rx="34" fill="#fffdf7"/>
    <rect x="620" y="330" width="360" height="290" rx="34" fill="#0b6b6b"/>
    <rect x="1130" y="350" width="360" height="250" rx="34" fill="#fffdf7"/>
  </g>
  <path d="M470 475H584" stroke="#7ea99e" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 16"/>
  <path d="M1016 475H1130" stroke="#7ea99e" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 16"/>
  <circle cx="170" cy="418" r="26" fill="#f2b34f"/><path d="M160 418h20M170 408v20" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <text x="210" y="427" class="card-title">Chrome extension</text>
  <text x="150" y="486" class="card-copy">A direct click captures one tab.</text><text x="150" y="518" class="card-copy">Silent, paired, and local.</text>
  <text x="150" y="565" class="tag">4 s / 8 s live windows</text>
  <circle cx="680" cy="400" r="30" fill="#f5c167"/><circle cx="680" cy="400" r="12" fill="#fff9e9"/>
  <text x="730" y="410" class="core-title">VOIVOX desktop App</text>
  <text x="670" y="472" class="core-copy">Selected-app capture · local ASR</text><text x="670" y="504" class="core-copy">timestamped raw sessions · secure bridge</text><text x="670" y="556" class="core-copy">No input-method or clipboard takeover</text>
  <circle cx="1190" cy="418" r="26" fill="#8bc9bd"/><path d="M1181 411h18v14h-18zM1185 425v8h10v-8" fill="#fff"/>
  <text x="1230" y="427" class="card-title">Codex MCP</text>
  <text x="1170" y="486" class="card-copy">Read or export local raw text.</text><text x="1170" y="518" class="card-copy">Save LLM results as derivatives.</text>
  <text x="1170" y="565" class="tag">stdio · token stays local</text>
  <g transform="translate(110 700)">
    <rect width="1380" height="88" rx="24" fill="#dce8e3"/>
    <text x="44" y="55" class="card-title">Privacy promise</text>
    <text x="305" y="55" class="sub">Raw audio stays on this Mac by default. Text reaches an LLM only when you choose to send it.</text>
  </g>
</svg>
